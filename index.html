<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <title>Zscaler IdP Integration Simulator</title>
      <link rel="stylesheet" href="style.css">
  </head>
  <body>
      <div id="simulator-container">
          <h1>Zscaler Zero Trust Simulator</h1>
          <p>This simulator demonstrates the authentication flow between Zscaler and an Identity Provider (IdP).</p>
          <button id="sso-button">Connect via SSO</button>
          <div id="status-display">Status: Ready</div>
          <div id="animation-stage">
              <div id="user-icon" style="left: 10%; top: 40%;">User</div>
              <div id="connector" class="hidden" style="left: 30%; top: 40%;">Zscaler Client Connector</div>
              <div id="idp-box" class="hidden" style="left: 55%; top: 10%;">Identity Provider (Azure AD/Okta)</div>
              <div id="zscaler-cloud" class="hidden" style="left: 80%; top: 40%;">Zscaler Security Cloud</div>
          </div>
      </div>
      <script src="script.js"></script>
  </body>
</html>
